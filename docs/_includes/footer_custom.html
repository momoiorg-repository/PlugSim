<div class="theme-toggle-wrap">
  <button id="theme-toggle-mobile" class="btn theme-toggle-btn" aria-label="Toggle colour scheme">
    <span class="theme-toggle-icon"></span>
    <span class="theme-toggle-label"></span>
  </button>
</div>

<script>
  (function () {
    function applyLabel(theme) {
      var icon  = document.querySelector('#theme-toggle-mobile .theme-toggle-icon');
      var label = document.querySelector('#theme-toggle-mobile .theme-toggle-label');
      if (!icon || !label) return;
      if (theme === 'dark') {
        icon.textContent  = '☀';
        label.textContent = '\u00a0Light mode';
      } else {
        icon.textContent  = '☾';
        label.textContent = '\u00a0Dark mode';
      }
    }

    applyLabel(jtd.getTheme());

    jtd.addEvent(document.getElementById('theme-toggle-mobile'), 'click', function () {
      var next = jtd.getTheme() === 'dark' ? 'light' : 'dark';
      jtd.setTheme(next);
      localStorage.setItem('jtd-theme', next);
      applyLabel(next);
      // Sync desktop toggle label if present
      var desktopIcon  = document.querySelector('#theme-toggle .theme-toggle-icon');
      var desktopLabel = document.querySelector('#theme-toggle .theme-toggle-label');
      if (desktopIcon)  desktopIcon.textContent  = icon.textContent;
      if (desktopLabel) desktopLabel.textContent = label.textContent;
    });
  })();
</script>
